emit:
  - "@typespec/openapi3"
  - "@typespec/http-client-csharp"
  - "@typespec/http-server-csharp"
options:
  "@typespec/openapi3":
    emitter-output-dir: "{output-dir}/schema"
    openapi-versions:
      - 3.1.0
  "@typespec/http-client-csharp":
    emitter-output-dir: "{output-dir}/clients/csharp"
  "@typespec/http-server-csharp":
    emitter-output-dir: "{output-dir}/server/aspnet"
